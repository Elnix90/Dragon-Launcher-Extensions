name: "Update Repo Structure Tree"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate File Tree
        run: |
          sudo apt-get install -y tree
          tree -L 3 -I '.git|node_modules|.github' > tree.txt
          
      - name: Update README.md
        run: |
          sed -i '/## 🌳 Repository Structure/Q' README.md
          echo "## 🌳 Repository Structure" >> README.md
          echo "" >> README.md
          echo "\`\`\`text" >> README.md
          cat tree.txt >> README.md
          echo "\`\`\`" >> README.md
          echo "" >> README.md
          echo "## 📄 License" >> README.md
          echo "This project is licensed under the **GPL 3 License**, the same as [Dragon Launcher](https://github.com/Elnix90/Dragon-Launcher). See the [LICENSE](LICENSE) file for more details." >> README.md
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add README.md
          git commit -m "docs: update repo structure tree [skip ci]" || exit 0
          git push
