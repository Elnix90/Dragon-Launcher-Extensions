name: Build Extensions APKs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Decode keystore
        env:
          KEYSTORE_FILE_B64: ${{ secrets.KEYSTORE_FILE_B64 }}
        run: |
          if [ -n "$KEYSTORE_FILE_B64" ]; then
            echo "$KEYSTORE_FILE_B64" | base64 -d > release.jks
          else
            echo "Warning: KEYSTORE_FILE_B64 secret is missing"
          fi

      - name: Build Release APKs
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Use the installed gradle instead of ./gradlew if it's missing
          if [ -f "release.jks" ]; then
            gradle assembleRelease
          else
            gradle assembleDebug
          fi

      - name: Prepare APKs for release
        run: |
          mkdir -p release-artifacts
          find . -name "*-release.apk" -exec cp {} release-artifacts/ \;
          find . -name "*-debug.apk" -exec cp {} release-artifacts/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-artifacts/*.apk
          body: "Official APKs for Dragon Launcher Extensions."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
