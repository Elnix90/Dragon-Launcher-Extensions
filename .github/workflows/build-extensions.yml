name: Build Extensions APKs

on:
  workflow_dispatch:
    inputs:
      build_proxy:
        description: 'Build Internet Proxy'
        type: boolean
        default: true
      build_update:
        description: 'Build Auto-Update'
        type: boolean
        default: true
      build_shizuku:
        description: 'Build Shizuku Installer'
        type: boolean
        default: true
      build_fonts:
        description: 'Build Additional Fonts'
        type: boolean
        default: true

jobs:
  prepare-version:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      matrix_list: ${{ steps.generate-matrix.outputs.matrix_list }}
    steps:
      - name: Get latest release
        id: get_latest
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.setOutput('tag', data.tag_name);
            } catch (e) {
              core.setOutput('tag', 'v0');
            }
      - name: Calculate next version
        id: bump
        run: |
          LATEST_TAG="${{ steps.get_latest.outputs.tag }}"
          # Extraction du numéro (ex: v1, v0.0.0, v2.1 -> 1, 0, 2)
          VERSION=$(echo $LATEST_TAG | sed 's/v//' | cut -d. -f1)
          NEW_V=$((VERSION + 1))
          echo "new_tag=v${NEW_V}" >> $GITHUB_OUTPUT

      - name: Generate Matrix List
        id: generate-matrix
        run: |
          LIST="[]"
          if [ "${{ github.event.inputs.build_proxy }}" = "true" ]; then LIST=$(echo $LIST | jq -c '. += ["ext-internet-proxy"]'); fi
          if [ "${{ github.event.inputs.build_update }}" = "true" ]; then LIST=$(echo $LIST | jq -c '. += ["ext-auto-update"]'); fi
          if [ "${{ github.event.inputs.build_shizuku }}" = "true" ]; then LIST=$(echo $LIST | jq -c '. += ["ext-shizuku-installer"]'); fi
          if [ "${{ github.event.inputs.build_fonts }}" = "true" ]; then LIST=$(echo $LIST | jq -c '. += ["ext-additional-fonts"]'); fi
          echo "matrix_list=$LIST" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.extension }}
    needs: prepare-version
    if: ${{ needs.prepare-version.outputs.matrix_list != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        extension: ${{ fromJson(needs.prepare-version.outputs.matrix_list) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Decode keystore
        env:
          KEYSTORE_FILE_B64: ${{ secrets.KEYSTORE_FILE_B64 || '' }}
        run: |
          if [ -n "$KEYSTORE_FILE_B64" ]; then
            echo "$KEYSTORE_FILE_B64" | base64 -d > release.jks
          else
            echo "Warning: KEYSTORE_FILE_B64 secret is missing"
          fi

      - name: Build Extension APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || '' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || '' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || '' }}
        run: |
          chmod +x gradlew
          if [ -f "release.jks" ]; then
            ./gradlew :${{ matrix.extension }}:assembleRelease
          else
            ./gradlew :${{ matrix.extension }}:assembleDebug
          fi

      - name: Prepare APK for release
        run: |
          mkdir -p release-artifacts
          find ${{ matrix.extension }}/build/outputs/apk/ -name "*.apk" -exec cp {} release-artifacts/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          body: "Official APKs for Dragon Launcher Extensions."
          tag_name: ${{ needs.prepare-version.outputs.new_tag }}
          append_body: true
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Badge Data
        if: always()
        run: |
          mkdir -p badges
          STATUS="${{ job.status == 'success' && 'Passed' || 'Failed' }}"
          COLOR="${{ job.status == 'success' && 'green' || 'red' }}"
          echo "{\"schemaVersion\": 1, \"label\": \"\", \"message\": \"$STATUS\", \"color\": \"$COLOR\", \"style\": \"for-the-badge\"}" > badges/${{ matrix.extension }}.json

      - name: Upload Badge Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: badge-${{ matrix.extension }}
          path: badges/${{ matrix.extension }}.json

  deploy-badges:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Badge Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-badges
          pattern: badge-*
          merge-multiple: true

      - name: Deploy Badges to Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./all-badges
          publish_branch: badges
          force_orphan: false
