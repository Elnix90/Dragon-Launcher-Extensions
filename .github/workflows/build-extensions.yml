name: Build Extensions APKs

on:
  workflow_dispatch:
    inputs:
      build_proxy:
        description: 'Build Internet Proxy'
        type: boolean
        default: true
      build_update:
        description: 'Build Auto-Update'
        type: boolean
        default: true
      build_shizuku:
        description: 'Build Shizuku Installer'
        type: boolean
        default: true
      build_fonts:
        description: 'Build Additional Fonts'
        type: boolean
        default: true

jobs:
  prepare:
    name: Prepare Run
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.gen_tag.outputs.tag_name }}
      matrix_list: ${{ steps.gen_matrix.outputs.matrix_list }}
      full_list: ${{ steps.gen_matrix.outputs.full_list }}
    steps:
      - name: Generate Unique Tag
        id: gen_tag
        run: |
          RAND=$(tr -dc 'a-z0-9' < /dev/urandom | head -c 4)
          TAG_NAME="run-$(date +'%Y%m%d-%H%M')-$RAND"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Generated Tag: $TAG_NAME"

      - name: All Extensions List
        id: gen_matrix
        run: |
          FULL_LIST='["ext-internet-proxy", "ext-auto-update", "ext-shizuku-installer", "ext-additional-fonts"]'
          echo "full_list=$FULL_LIST" >> $GITHUB_OUTPUT
          
          # Liste à construire (uniquement celles cochées)
          LIST="[]"
          if [ "${{ github.event.inputs.build_proxy }}" = "true" ]; then LIST=$(echo $LIST | jq -c '. += ["ext-internet-proxy"]'); fi
          if [ "${{ github.event.inputs.build_update }}" = "true" ]; then LIST=$(echo $LIST | jq -c '. += ["ext-auto-update"]'); fi
          if [ "${{ github.event.inputs.build_shizuku }}" = "true" ]; then LIST=$(echo $LIST | jq -c '. += ["ext-shizuku-installer"]'); fi
          if [ "${{ github.event.inputs.build_fonts }}" = "true" ]; then LIST=$(echo $LIST | jq -c '. += ["ext-additional-fonts"]'); fi
          echo "matrix_list=$LIST" >> $GITHUB_OUTPUT

  build:
    name: Process ${{ matrix.extension }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        extension: ${{ fromJson(needs.prepare.outputs.full_list) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if build is needed
        id: check_build
        run: |
          BUILD_LIST='${{ needs.prepare.outputs.matrix_list }}'
          if echo "$BUILD_LIST" | jq -e ". | contains([\"${{ matrix.extension }}\"])" > /dev/null; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Extension ${{ matrix.extension }} is selected for build."
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "Extension ${{ matrix.extension }} NOT selected. Will fetch previous version."
          fi

      - name: Set up JDK 17
        if: steps.check_build.outputs.should_build == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Gradle
        if: steps.check_build.outputs.should_build == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build Extension APK
        if: steps.check_build.outputs.should_build == 'true'
        env:
          KEYSTORE_FILE_B64: ${{ secrets.KEYSTORE_FILE_B64 || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || '' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || '' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || '' }}
        run: |
          if [ -n "$KEYSTORE_FILE_B64" ]; then
            echo "$KEYSTORE_FILE_B64" | base64 -d > "${{ github.workspace }}/release.jks"
            export KEYSTORE_FILE="${{ github.workspace }}/release.jks"
            echo "Using release keystore for assembly"
            chmod +x gradlew
            ./gradlew :${{ matrix.extension }}:assembleRelease
          else
            echo "No release keystore found, building debug"
            chmod +x gradlew
            ./gradlew :${{ matrix.extension }}:assembleDebug
          fi

      - name: Prepare APK from Build
        if: steps.check_build.outputs.should_build == 'true'
        run: |
          APK_FILE=$(find ${{ matrix.extension }}/build/outputs/apk/ -name "*.apk" | head -n 1)
          VERSION_NAME=$(grep "versionName =" ${{ matrix.extension }}/build.gradle.kts | cut -d'"' -f2 || echo "1.0.0")
          mkdir -p release-artifacts
          cp "$APK_FILE" "release-artifacts/${{ matrix.extension }}-$VERSION_NAME.apk"

      - name: Fetch Previous APK
        if: steps.check_build.outputs.should_build == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const extension = '${{ matrix.extension }}';
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            for (const release of releases.data) {
              const asset = release.assets.find(a => a.name.startsWith(extension) && a.name.endsWith('.apk'));
              if (asset) {
                console.log(`Found previous version: ${asset.name} in release ${release.tag_name}`);
                const response = await fetch(asset.browser_download_url);
                const buffer = Buffer.from(await response.arrayBuffer());
                const fs = require('fs');
                if (!fs.existsSync('release-artifacts')) fs.mkdirSync('release-artifacts');
                fs.writeFileSync(`release-artifacts/${asset.name}`, buffer);
                return;
              }
            }
            core.setFailed(`No previous APK found for ${extension}`);

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: "Release ${{ needs.prepare.outputs.tag_name }}"
          body: "Dragon Launcher Extensions build run. Includes updated and previous stable versions."
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Badge Data
        if: always()
        run: |
          mkdir -p badges
          STATUS="${{ job.status == 'success' && 'Passed' || (steps.check_build.outputs.should_build == 'false' && 'Previous' || 'Failed') }}"
          COLOR="${{ job.status == 'success' && 'green' || (steps.check_build.outputs.should_build == 'false' && 'blue' || 'red') }}"
          echo "{\"schemaVersion\": 1, \"label\": \"\", \"message\": \"$STATUS\", \"color\": \"$COLOR\", \"style\": \"for-the-badge\"}" > badges/${{ matrix.extension }}.json

      - name: Upload Badge Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: badge-${{ matrix.extension }}
          path: badges/${{ matrix.extension }}.json

  deploy-badges:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download All Badge Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-badges
          pattern: badge-*
          merge-multiple: true
      - name: Deploy Badges
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./all-badges
          publish_branch: badges
